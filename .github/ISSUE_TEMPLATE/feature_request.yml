name: 기능 제안
description: Agent Guard의 동작이나 사용 경험 개선을 제안해 주세요.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 특정 구현보다 현재 막히는 작업과 사용 환경을 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 동작
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안

  - type: checkboxes
    id: boundaries
    attributes:
      label: 제품 경계 확인
      options:
        - label: 제안에 클라우드 업로드나 텔레메트리가 필요하다면 그 이유와 로컬 전용 대안을 함께 설명했습니다.
          required: true
