name: Build Windows Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows prerelease
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify project version
        shell: pwsh
        run: |
          npm run version:check
          "APP_VERSION=$((Get-Content package.json -Raw | ConvertFrom-Json).version)" >> $env:GITHUB_ENV

      - name: Run release checks
        run: |
          npm test
          npm run check

      - name: Build portable executable
        shell: pwsh
        run: |
          $env:CARGO_TARGET_DIR = Join-Path $env:RUNNER_TEMP 'portable-target'
          npx tauri build --no-bundle
          $source = Join-Path $env:CARGO_TARGET_DIR 'release\agentguard.exe'
          $portable = Join-Path $env:RUNNER_TEMP "AgentGuard-v$env:APP_VERSION-windows-x64-portable.exe"
          if (-not (Test-Path -LiteralPath $source)) {
            throw "Tauri executable not found: $source"
          }
          Copy-Item -LiteralPath $source -Destination $portable

      - name: Build installers and create prerelease
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Agent Guard v__VERSION__
          releaseBody: |
            Development prerelease for Agent Guard.

            - `-setup.exe`: recommended Windows installer (NSIS)
            - `.msi`: Windows Installer package
            - `-portable.exe`: unsigned standalone executable; WebView2 Runtime is required
            - `SHA256SUMS.txt`: checksums for all Windows binaries in this release

            These binaries are not code-signed yet, so Windows SmartScreen may show a warning.
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: true
          uploadUpdaterJson: false
          releaseAssetNamePattern: AgentGuard-v[version]-windows-[arch][setup][ext]

      - name: Smoke test portable executable
        shell: pwsh
        run: |
          $portable = Join-Path $env:RUNNER_TEMP "AgentGuard-v$env:APP_VERSION-windows-x64-portable.exe"
          $process = Start-Process -FilePath $portable -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 5
          if ($process.HasExited) {
            throw "Portable app exited during startup with code $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id
          Wait-Process -Id $process.Id -ErrorAction SilentlyContinue

      - name: Attach portable executable
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $portable = Join-Path $env:RUNNER_TEMP "AgentGuard-v$env:APP_VERSION-windows-x64-portable.exe"
          if (-not (Test-Path -LiteralPath $portable)) {
            throw "Portable executable not found: $portable"
          }
          gh release upload "v$env:APP_VERSION" $portable --clobber

      - name: Publish SHA-256 checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assetDir = Join-Path $env:RUNNER_TEMP 'release-assets'
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null
          gh release download "v$env:APP_VERSION" --dir $assetDir --pattern '*.exe' --pattern '*.msi'
          $binaries = Get-ChildItem -LiteralPath $assetDir -File |
            Where-Object { $_.Extension -in '.exe', '.msi' } |
            Sort-Object Name
          if ($binaries.Count -lt 3) {
            throw "Expected NSIS, MSI, and portable assets; found $($binaries.Count)"
          }
          $checksumFile = Join-Path $env:RUNNER_TEMP 'SHA256SUMS.txt'
          $lines = $binaries | ForEach-Object {
            $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          Set-Content -LiteralPath $checksumFile -Value $lines -Encoding utf8NoBOM
          gh release upload "v$env:APP_VERSION" $checksumFile --clobber
