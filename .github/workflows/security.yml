name: Rust dependency audit

on:
  pull_request:
    paths:
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/security.yml'
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/security.yml'
  schedule:
    - cron: '17 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Cargo advisory database
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Audit locked Rust dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
